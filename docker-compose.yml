version: '3.8'

services:
  # 1. Primary PostgreSQL Database Engine
  postgres:
    image: postgres:15-alpine
    container_name: reply_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_db_password
      POSTGRES_DB: reply_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - reply_network
    ports:
      - "5432:5432" # Exposed locally; can be blocked/commented out for strict isolation
    restart: always

  # 2. Connection Pooler (PgBouncer) for scaling database transactions
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: reply_pgbouncer
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_db_password@postgres:5432/reply_ai
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
    ports:
      - "6432:6432"
    networks:
      - reply_network
    depends_on:
      - postgres
    restart: always

  # 3. Redis broker for BullMQ job queues & WebSockets state
  redis:
    image: redis:7-alpine
    container_name: reply_redis
    command: redis-server --appendonly yes --save ""
    volumes:
      - redis_data:/data
    networks:
      - reply_network
    ports:
      - "6379:6379" # Exposed locally; can be isolated internally
    restart: always

  # 4. Automated Database Schema Initialization (Runs once on startup)
  db-init:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: reply_db_init
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_db_password@postgres:5432/reply_ai?connection_limit=2
    command: npx prisma db push --accept-data-loss
    networks:
      - reply_network
    depends_on:
      - postgres

  # 5. Next.js App Router (Frontend Web App & REST APIs)
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reply_nextjs_app
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_db_password@pgbouncer:6432/reply_ai?pgbouncer=true&connection_limit=10
      - DIRECT_URL=postgresql://postgres:your_secure_db_password@postgres:5432/reply_ai?connection_limit=2
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_change_me
      - GEMINI_API_KEY=your_gemini_api_key_here
      - FACEBOOK_APP_SECRET=your_facebook_app_secret_here
      - META_VERIFY_TOKEN=your_meta_verify_token_here
      - META_GRAPH_VERSION=v22.0
    ports:
      - "3000:3000"
    networks:
      - reply_network
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    restart: always

  # 6. Standalone WebSocket Server (Real-time Broadcaster)
  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: reply_ws_server
    environment:
      - WS_PORT=4000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_change_me
      - NEXT_PUBLIC_APP_URL=*
    ports:
      - "4000:4000"
    networks:
      - reply_network
    depends_on:
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    restart: always

  # 7. BullMQ Worker Node (Background Job Consumer)
  bullmq-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: reply_bullmq_worker
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_db_password@pgbouncer:6432/reply_ai?pgbouncer=true&connection_limit=15
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=your_gemini_api_key_here
      - FACEBOOK_APP_SECRET=your_facebook_app_secret_here
      - META_VERIFY_TOKEN=your_meta_verify_token_here
      - META_GRAPH_VERSION=v22.0
      - WORKER_CONCURRENCY=10
    networks:
      - reply_network
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    restart: always

volumes:
  pg_data:
  redis_data:

networks:
  reply_network:
    driver: bridge
